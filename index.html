<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Private Chat System</title>
    <link rel="stylesheet" href="./index.css">
    <script src="./index.js" defer></script>
</head>
<body>
    <div class="container">
        <dialog class="popup" id='link-popup'>
            <div class="pop-up-head">
                <h4 id="pop-up-heading">Chat Session Created Successfully</h4>
                <button id="close-btn">&times;</button>
            </div>
            <div class="link">
                <span id="link-inp">
                    <p>Copy or Share this link</p>
                </span>
                <div>
                    <button  id="copy-btn" onclick="copyToClipboard()" title='Copy Link'>
                        <svg id="icon-copy" width="20" height="20" viewBox="0 0 24 24" fill="none" 
                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        <svg id="icon-success" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" 
                            stroke="#4BB543" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </button>
                    <button id="share-btn" onclick="share()" title="Share Link">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="18" cy="5" r="3"></circle>
                            <circle cx="6" cy="12" r="3"></circle>
                            <circle cx="18" cy="19" r="3"></circle>
                            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                        </svg>
                    </button>
                    <button id="connect-btn" onclick="connect()" class="hidden">Connect</button>
                </div>
            </div>
        </dialog>
        <div id="chat-interface">
            <div id="chat-header">
                <div class="status-group">
                    <span id="connection-indicator"></span>
                    <span id="status-text">Initializing ...</span>
                </div>
                <div id="live-clock"></div>
            </div>
            <div id="chat-display">
            </div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Enter message here...">
                <button onclick="sendMsg()" id="send-btn">SEND</button>
            </div>
        </div>
    </div>
</body>
</html>
